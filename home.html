<h2>Users</h2>
<div id="users"></div>

<script src="firebase.js"></script>

<script>
auth.onAuthStateChanged(user=>{
  if(!user){
    location.href="index.html";
  }

  db.collection("users").onSnapshot(snap=>{
    users.innerHTML="";
    snap.forEach(doc=>{
      let u=doc.data();

      let div=document.createElement("div");
      div.innerText=u.username;

      users.appendChild(div);
    });
  });
});
</script>
