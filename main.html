<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
}

iframe{
  width:100%;
  height:90vh;
  border:none;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#fff;
  padding:10px;
  border-top:1px solid #ccc;
}

button{
  font-size:20px;
  background:none;
  border:none;
}
</style>

</head>

<body>

<iframe id="frame" src="home.html"></iframe>

<div class="nav">
  <button onclick="load('home.html')">💬</button>
  <button onclick="load('camera.html')">📷</button>
  <button onclick="load('settings.html')">⚙️</button>
</div>

<script>
function load(page){
  document.getElementById("frame").src = page;
}
</script>

</body>
</html>
